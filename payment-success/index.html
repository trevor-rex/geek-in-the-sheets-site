<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're in! | Geek in the Sheets</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      max-width: 520px;
    }

    .checkmark {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      color: #2e7d32;
      margin-bottom: 0.5rem;
    }

    .divider {
      width: 48px;
      height: 4px;
      background-color: #f4b400;
      border-radius: 2px;
      margin: 1.25rem auto;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #444;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .instructions {
      background-color: #fff;
      border: 1px solid #e0e0e0;
      border-left: 4px solid #2e7d32;
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      text-align: left;
      font-size: 0.95rem;
      color: #444;
      line-height: 1.8;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .step:last-child {
      margin-bottom: 0;
    }

    .step-num {
      background-color: #f4b400;
      color: #1a1a1a;
      font-weight: bold;
      font-size: 0.8rem;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <main>
    <div class="checkmark">🎉</div>
    <h1>You're subscribed!</h1>
    <p class="subtitle">Thank you for subscribing to Geek in the Sheets. Your support means everything.</p>
    <div class="divider"></div>
    <div class="instructions">
      <div class="step">
        <div class="step-num">1</div>
        <span>Go back to your Google Sheet</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>Open the <strong>Geek in the Sheets</strong> add-on</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>Refresh the page — you're good to go!</span>
      </div>
    </div>
  </main>
</body>
</html>
